[build]
  # Monorepo: build the shared workspace first (turbo dependency), then the web
  # app. Netlify runs this command from the repo root (/opt/build/repo), so the
  # shared build runs there and only the final step changes into apps/web.
  command = "npm run build --workspace=@astra/shared && cd apps/web && npm run build"
  publish = "apps/web/.next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  node_bundler = "esbuild"

[build.environment]
  NODE_VERSION = "20"
